<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrace Client-Side Test Runner</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0f1d;
      --bg-secondary: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --primary: #10b981; /* Green */
      --danger: #ef4444; /* Red */
      --info: #3b82f6; /* Blue */
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 40px 20px;
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.25rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 30px;
    }

    /* Summary Bar */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .summary-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .summary-value {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1;
      margin-top: 8px;
    }

    .val-total { color: var(--info); }
    .val-passed { color: var(--primary); }
    .val-failed { color: var(--danger); }

    /* Suite Cards */
    .suite-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .suite-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
    }

    .suite-stats {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* Test Case Items */
    .test-item {
      padding: 12px 16px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.15);
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      border-left: 4px solid;
    }

    .test-item.pass {
      border-left-color: var(--primary);
    }

    .test-item.fail {
      border-left-color: var(--danger);
      background: rgba(239, 68, 68, 0.05);
    }

    .test-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .test-name {
      font-weight: 500;
    }

    .test-status {
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
    }

    .status-pass { color: var(--primary); }
    .status-fail { color: var(--danger); }

    .error-trace {
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--danger);
      background: rgba(0, 0, 0, 0.4);
      padding: 12px;
      border-radius: 6px;
      margin-top: 10px;
      white-space: pre-wrap;
      overflow-x: auto;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>EcoTrace Client-Side Test Runner</h1>
    <p class="subtitle">Executing unit and integration suites natively via ES Modules.</p>

    <!-- Summary Widgets -->
    <div class="summary-bar">
      <div class="summary-card">
        <div class="text-secondary" style="font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Total Tests</div>
        <div class="summary-value val-total" id="summary-total">0</div>
      </div>
      <div class="summary-card">
        <div class="text-secondary" style="font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Passed</div>
        <div class="summary-value val-passed" id="summary-passed">0</div>
      </div>
      <div class="summary-card">
        <div class="text-secondary" style="font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Failed</div>
        <div class="summary-value val-failed" id="summary-failed">0</div>
      </div>
    </div>

    <!-- Suites Container -->
    <div id="suites-container">
      <div style="text-align: center; color: var(--text-secondary); padding: 40px 0;">Running test suites...</div>
    </div>
  </div>

  <script type="module">
    import { runUnitTests } from './unit-tests.js';
    import { runIntegrationTests } from './integration-tests.js';

    // Execute Suites
    runUnitTests();
    runIntegrationTests();

    // Render results once suites finished executing
    const suitesContainer = document.getElementById('suites-container');
    suitesContainer.innerHTML = ''; // Clear loader

    let totalTests = 0;
    let totalPassed = 0;
    let totalFailed = 0;

    window.testSuites.forEach(suite => {
      totalTests += suite.stats.total;
      totalPassed += suite.stats.passed;
      totalFailed += suite.stats.failed;

      // Create suite element
      const suiteCard = document.createElement('div');
      suiteCard.className = 'suite-card';

      const suiteTitle = document.createElement('div');
      suiteTitle.className = 'suite-title';
      suiteTitle.innerHTML = `
        <span>${suite.name}</span>
        <span class="suite-stats">${suite.stats.passed}/${suite.stats.total} passed</span>
      `;
      suiteCard.appendChild(suiteTitle);

      // Handle full suite-level load errors
      if (suite.error) {
        const errBlock = document.createElement('div');
        errBlock.className = 'error-trace';
        errBlock.textContent = `Suite level load error:\n${suite.error}`;
        suiteCard.appendChild(errBlock);
      }

      // Render test cases
      suite.tests.forEach(test => {
        const testItem = document.createElement('div');
        testItem.className = `test-item ${test.passed ? 'pass' : 'fail'}`;

        const testHeader = document.createElement('div');
        testHeader.className = 'test-header';
        
        const testName = document.createElement('span');
        testName.className = 'test-name';
        testName.textContent = test.name;
        
        const testStatus = document.createElement('span');
        testStatus.className = `test-status ${test.passed ? 'status-pass' : 'status-fail'}`;
        testStatus.textContent = test.passed ? 'pass' : 'fail';

        testHeader.appendChild(testName);
        testHeader.appendChild(testStatus);
        testItem.appendChild(testHeader);

        // Render stack trace if failed
        if (!test.passed && test.error) {
          const errTrace = document.createElement('pre');
          errTrace.className = 'error-trace';
          errTrace.textContent = test.error;
          testItem.appendChild(errTrace);
        }

        suiteCard.appendChild(testItem);
      });

      suitesContainer.appendChild(suiteCard);
    });

    // Update Summary widgets
    document.getElementById('summary-total').textContent = String(totalTests);
    document.getElementById('summary-passed').textContent = String(totalPassed);
    document.getElementById('summary-failed').textContent = String(totalFailed);

    // Communicate results for headless browser scripts (if parsing console output)
    console.log(`__TEST_RESULTS__: TOTAL=${totalTests}, PASSED=${totalPassed}, FAILED=${totalFailed}`);
  </script>
</body>
</html>
